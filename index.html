<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2">
    <title>MEROE - Gestión Cooperativa</title>
    <style>
        /* ESTILOS GENERALES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* PANTALLA DE BLOQUEO */
        #bloqueo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #064e3b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            color: white;
            text-align: center;
        }

        #bloqueo input {
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            width: 250px;
            text-align: center;
        }

        /* BOTÓN MENÚ (Hamburguesa) */
        .menu-boton {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #064e3b;
            border-radius: 8px;
            display: none; /* Se activa al desbloquear */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 10001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .menu-boton span { width: 30px; height: 4px; background: white; border-radius: 2px; }

        /* PANEL LATERAL */
        #panel-lateral {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100vh;
            background: white;
            z-index: 10000;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            padding-top: 80px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.2);
        }

        #panel-lateral.abierto { left: 0; }

        .panel-header { padding: 0 25px 20px; color: #064e3b; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; }

        /* BOTONES Y ENLACES DEL MENÚ */
        .menu-item a, .menu-desplegable-btn {
            display: block;
            width: 100%;
            padding: 20px 25px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            background: none;
            text-align: left;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-family: inherit;
        }

        /* SUBMENÚS */
        .sub-menu {
            max-height: 0;
            overflow: hidden;
            background: #f9fdfb;
            transition: max-height 0.3s ease-out;
        }

        .sub-menu.show { max-height: 350px; border-bottom: 1px solid #eee; }

        .sub-menu-content { padding: 20px; text-align: center; }
        .logo-constructora { width: 140px; height: auto; margin-bottom: 10px; }
        
        /* CONTENIDO PRINCIPAL */
        #contenido { display: none; padding: 20px; text-align: center; width: 100%; max-width: 800px; }

        /* AJUSTES MÓVIL (ZOOM) */
        @media (max-width: 600px) {
            #panel-lateral { width: 80%; }
            .menu-boton { width: 60px; height: 60px; } /* Más grande para el dedo */
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2>COOPERATIVA MEROE</h2>
        <p>Introduce la clave de acceso:</p>
        <input type="password" id="pass" oninput="verificar()" placeholder="Contraseña...">
    </div>

    <div class="menu-boton" id="btn-menu" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>

    <nav id="panel-lateral">
        <div class="panel-header">GESTIÓN MEROE</div>
        
        <div class="menu-item">
            <button class="menu-desplegable-btn" onclick="toggleSubMenu('sub-constructora')">🏗️ Constructora</button>
            <div id="sub-constructora" class="sub-menu">
                <div class="sub-menu-content">
                    <img src="logo_amenabar.png" alt="Amenabar" class="logo-constructora">
                    <p><strong>Amenabar</strong></p>
                </div>
            </div>
        </div>

        <div class="menu-item">
            <button class="menu-desplegable-btn" onclick="toggleSubMenu('sub-consejo')">👥 Consejo Rector</button>
            <div id="sub-consejo" class="sub-menu">
                <div style="padding: 15px 25px; font-size: 0.9rem; color: #666;">
                    <p><strong>Presidente:</strong> [Nombre]</p>
                    <p><strong>Vicepresidente:</strong> [Nombre]</p>
                    <p><strong>Secretaria:</strong> [Nombre]</p>
                </div>
            </div>
        </div>

        <div class="menu-item"><a href="https://chat.whatsapp.com/K6voRMYpnaL8LlxvP82fa0" target="_blank">💬 WhatsApp</a></div>
        <div class="menu-item"><a href="meroe_memoria_calidades.pdf" target="_blank">🏠 Calidades</a></div>
    </nav>

    <div id="contenido">
        <h1>Bienvenido a Meroe</h1>
        <p>Selecciona una opción en el menú de la izquierda para comenzar.</p>
        </div>

    <script>
        // 1. Verificar Contraseña
        function verificar() {
            const clave = document.getElementById('pass').value;
            if (clave === "Meroe2026") { // Cambia esto por tu clave real
                document.getElementById('bloqueo').style.display = 'none';
                document.getElementById('contenido').style.display = 'block';
                document.getElementById('btn-menu').style.display = 'flex';
            }
        }

        // 2. Abrir/Cerrar Panel Lateral
        function toggleMenu() {
            document.getElementById('panel-lateral').classList.toggle('abierto');
        }

        // 3. Abrir/Cerrar Submenús
        function toggleSubMenu(id) {
            const sub = document.getElementById(id);
            document.querySelectorAll('.sub-menu').forEach(m => {
                if(m.id !== id) m.classList.remove('show');
            });
            sub.classList.toggle('show');
        }

        // 4. Cerrar al hacer clic fuera
        document.addEventListener('click', function(e) {
            const panel = document.getElementById('panel-lateral');
            const btn = document.getElementById('btn-menu');
            if (panel.classList.contains('abierto') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('abierto');
            }
        });
    </script>
</body>
</html>
